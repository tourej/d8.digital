  <!--
    D8.Digital Content Manager (Decap CMS)
    ───────────────────────────────────────
    SETUP (one-time, ~10 minutes):

    1. Push this project to a GitHub repository.

    2. Create a GitHub OAuth App:
       • Go to: github.com/settings/developers → "New OAuth App"
       • Application name: D8.Digital CMS
       • Homepage URL: https://d8.digital
       • Authorization callback URL: https://d8.digital/admin/
       • Copy the Client ID, paste it into admin/config.yml as `app_id`

    3. In admin/config.yml, set:
       • repo: your-github-username/your-repo-name
       • app_id: the Client ID from step 2

    LOCAL DEVELOPMENT:
       • Install: npm install -g decap-server
       • Run alongside your python server: npx decap-server
       • The `local_backend: true` flag in config.yml enables this automatically.
  -->
  <script src="https://unpkg.com/decap-cms@3.14.1/dist/decap-cms.js"></script>
</body>
</html>
