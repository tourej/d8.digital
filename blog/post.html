<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Blog, D8.Digital</title>
  <meta name="description" id="page-desc" content="Insights on branding, web design, SEO, and digital marketing for Houston businesses.">
  <meta property="og:title" id="og-title" content="Blog, D8.Digital">
  <meta property="og:description" id="og-desc" content="Insights on web design, SEO, branding, and digital strategy for growing businesses.">
  <meta property="og:type" content="article">
  <meta property="og:image" content="https://d8.digital/images/og-default.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <link id="canonical" rel="canonical" href="https://d8.digital/blog/post.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Archivo:ital,wght@0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles.css">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
  <meta name="theme-color" content="#0b0e0c">

  <style>
    /* ── Post hero ──────────────────────────────────── */
    .post-hero {
      padding-top: clamp(8rem, 16vw, 12rem);
      padding-bottom: clamp(3rem, 6vw, 5rem);
      padding-left: clamp(1.5rem, 4vw, 3rem);
      padding-right: clamp(1.5rem, 4vw, 3rem);
      position: relative; overflow: hidden;
      border-bottom: 1px solid var(--rule);
    }
    .post-hero::before {
      content: ''; position: absolute;
      width: 480px; height: 480px;
      background: radial-gradient(circle, var(--green-g1) 0%, transparent 65%);
      top: -60px; right: -100px;
      border-radius: 50%; pointer-events: none;
    }
    .post-hero-inner { max-width: 820px; margin: 0 auto; position: relative; z-index: 1; }
    .post-back {
      display: inline-flex; align-items: center; gap: .5rem;
      color: var(--ink3); text-decoration: none; font-size: .8rem;
      margin-bottom: 2.5rem; transition: color .2s;
    }
    .post-back:hover { color: var(--green); }
    .post-meta {
      display: flex; align-items: center; gap: .75rem;
      margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .post-cat {
      font-size: .67rem; font-weight: 600; color: var(--green);
      letter-spacing: .14em; text-transform: uppercase;
    }
    .post-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink3); }
    .post-date, .post-read { font-size: .8rem; color: var(--ink3); }
    .post-h1 {
      font-family: 'Archivo', sans-serif; font-weight: 800;
      font-size: clamp(2.25rem, 5.5vw, 4rem);
      line-height: 1.05; letter-spacing: -.035em;
      margin-bottom: 1.5rem;
    }
    .post-excerpt {
      font-size: 1.15rem; color: var(--ink2); line-height: 1.7;
      font-style: italic;
    }

    /* ── Post body ──────────────────────────────────── */
    .post-wrap {
      padding: clamp(3rem, 7vw, 6rem) clamp(1.5rem, 4vw, 3rem);
    }
    .post-content {
      max-width: 720px; margin: 0 auto;
      font-size: 1.05rem; line-height: 1.8; color: var(--ink2);
    }
    .post-content h2 {
      font-family: 'Archivo', sans-serif; font-weight: 800;
      font-size: clamp(1.4rem, 3vw, 2rem);
      letter-spacing: -.025em; line-height: 1.15;
      color: var(--ink); margin: 2.5rem 0 1rem;
    }
    .post-content h3 {
      font-family: 'Archivo', sans-serif; font-weight: 600;
      font-size: 1.15rem; color: var(--ink);
      margin: 2rem 0 .75rem;
    }
    .post-content p { margin-bottom: 1.5rem; }
    .post-content ul, .post-content ol {
      padding-left: 1.5rem; margin-bottom: 1.5rem;
    }
    .post-content li { margin-bottom: .625rem; }
    .post-content strong { color: var(--ink); font-weight: 600; }
    .post-content em { color: var(--ink); }
    .post-content a { color: var(--green); text-decoration: none; border-bottom: 1px solid var(--green-dim); transition: border-color .2s; }
    .post-content a:hover { border-color: var(--green); }
    .post-content blockquote {
      border-left: 3px solid var(--green);
      padding: 1rem 1.5rem;
      margin: 2rem 0;
      background: var(--bg2);
      border-radius: 0 8px 8px 0;
      color: var(--ink);
      font-style: italic;
    }

    /* ── Tags ───────────────────────────────────────── */
    .post-tags {
      display: flex; gap: .5rem; flex-wrap: wrap;
      padding-top: 2rem; margin-top: 2rem;
      border-top: 1px solid var(--rule);
      max-width: 720px; margin-left: auto; margin-right: auto;
    }
    .post-tag {
      padding: .35rem 1rem; border-radius: 100px;
      border: 1px solid var(--rule); color: var(--ink3);
      font-size: .75rem; font-weight: 400;
    }

    /* ── Back link ──────────────────────────────────── */
    .post-nav {
      max-width: 720px; margin: 2.5rem auto 0;
      display: flex; justify-content: space-between; align-items: center;
      gap: 1rem; flex-wrap: wrap;
    }

    /* ── CTA ─────────────────────────────────────────── */
    .cta-inner { max-width: 820px; margin: 0 auto; text-align: center; }
    .cta-h2 { font-family: 'Archivo', sans-serif; font-size: clamp(3rem, 7.5vw, 8rem); font-weight: 800; line-height: .9; letter-spacing: -.052em; margin-bottom: 2rem; }
    .cta-sub { color: var(--ink2); font-size: 1.05rem; line-height: 1.68; margin-bottom: 2.75rem; }

    /* ── Not found ──────────────────────────────────── */
    .not-found {
      padding: clamp(8rem, 16vw, 12rem) clamp(1.5rem, 4vw, 3rem);
      text-align: center;
    }
    .not-found h2 { font-family: 'Archivo', sans-serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; margin-bottom: 1rem; }
    .not-found p { color: var(--ink2); margin-bottom: 2rem; }

    @media (max-width: 640px) {
      .post-nav { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="cur"  id="cur"></div>
  <div class="cur-ring" id="curR"></div>

  <div id="nav-mount"></div>

  <div id="post-root"></div>

  <div id="footer-mount"></div>

  <script src="/shared/components.js"></script>
  <script>
    (async function () {
      const slug = new URLSearchParams(location.search).get('slug');

      if (!slug) {
        renderNotFound();
        return;
      }

      const res = await fetch('/data/blog.json');
      const { posts } = await res.json();
      const post = posts.find(p => p.slug === slug);

      if (!post) {
        renderNotFound();
        return;
      }

      /* Update head */
      document.getElementById('page-title').textContent = post.title + ', D8.Digital';
      document.getElementById('page-desc').setAttribute('content', post.excerpt);
      document.getElementById('og-title').setAttribute('content', post.title + ', D8.Digital');
      document.getElementById('og-desc').setAttribute('content', post.excerpt);
      const canonicalUrl = 'https://d8.digital/blog/post.html?slug=' + slug;
      document.getElementById('canonical').setAttribute('href', canonicalUrl);

      /* Article schema */
      const schema = {
        '@context': 'https://schema.org',
        '@type': 'BlogPosting',
        'headline': post.title,
        'description': post.excerpt,
        'datePublished': post.date,
        'dateModified': post.updated || post.date,
        'author': { '@type': 'Organization', 'name': 'D8.Digital', 'url': 'https://d8.digital' },
        'publisher': { '@type': 'Organization', 'name': 'D8.Digital', 'url': 'https://d8.digital' },
        'url': canonicalUrl,
        'keywords': post.tags.join(', '),
        'articleSection': post.category,
        'inLanguage': 'en-US'
      };
      const s = document.createElement('script');
      s.type = 'application/ld+json';
      s.textContent = JSON.stringify(schema);
      document.head.appendChild(s);

      function formatDate(str) {
        return new Date(str + 'T12:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      }

      const updatedLine = post.updated
        ? `<span class="post-dot"></span><span class="post-date">Updated ${formatDate(post.updated)}</span>`
        : '';

      const tagsHtml = post.tags.map(t => `<span class="post-tag">${t}</span>`).join('');

      document.getElementById('post-root').innerHTML = `
        <article>
          <header class="post-hero">
            <div class="post-hero-inner">
              <a href="/blog/index.html" class="post-back">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11.5 7H2.5M6 3L2.5 7 6 11"/></svg>
                All Posts
              </a>
              <div class="post-meta">
                <span class="post-cat">${post.category}</span>
                <span class="post-dot"></span>
                <span class="post-date">${formatDate(post.date)}</span>
                ${updatedLine}
                <span class="post-dot"></span>
                <span class="post-read">${post.readTime} min read</span>
              </div>
              <h1 class="post-h1">${post.title}</h1>
              <p class="post-excerpt">${post.excerpt}</p>
            </div>
          </header>

          <div class="post-wrap">
            <div class="post-content rv in">
              ${post.content}
            </div>

            <div class="post-tags">
              ${tagsHtml}
            </div>

            <nav class="post-nav" aria-label="Post navigation">
              <a href="/blog/index.html" class="btn-ghost">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11.5 7H2.5M6 3L2.5 7 6 11"/></svg>
                Back to Blog
              </a>
              <a href="/book.html" class="btn-fill">
                Work With Us
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.5 7h9M8 3l4 4-4 4"/></svg>
              </a>
            </nav>
          </div>
        </article>

        <section class="section" id="contact" style="background:var(--bg2); border-top:1px solid var(--rule)">
          <div class="cta-inner">
            <div class="lbl rv" style="justify-content:center">Work With Us</div>
            <h2 class="cta-h2 rv">Let's Build<br>Something<br><span class="g">Together.</span></h2>
            <p class="cta-sub rv d1">Every engagement starts with a conversation. Let's talk about your brand, your goals, and what it takes to compete in your market.</p>
            <div class="rv d2">
              <a href="/book.html" class="btn-fill">Schedule Your Free Call <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 7.5h9M8.5 3.5l4 4-4 4"/></svg></a>
            </div>
          </div>
        </section>`;

      /* Wire reveals for CTA section */
      setTimeout(() => {
        const io = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
        }, { threshold: 0.08 });
        document.querySelectorAll('.rv:not(.in)').forEach(el => io.observe(el));
      }, 0);

    })();

    function renderNotFound() {
      document.getElementById('post-root').innerHTML = `
        <div class="not-found">
          <a href="/blog/index.html" class="post-back" style="justify-content:center;margin-bottom:2rem">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 7H2.5M6 3L2.5 7 6 11"/></svg>
            All Posts
          </a>
          <h2>Post Not Found</h2>
          <p>That post doesn't seem to exist. Try browsing all posts below.</p>
          <a href="/blog/index.html" class="btn-fill">Browse the Blog</a>
        </div>`;
    }
  </script>
</body>
</html>
